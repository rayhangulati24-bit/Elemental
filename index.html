<!DOCTYPE html>
<html lang="en">
<head>
    <style>
body {
    margin: 0;
    overflow: hidden;
}
canvas {
    display: block;
}
</style>
<meta charset="UTF-8">
<title>Fire & Water Online</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="characterSelect" class="character-select">
    <h1>Choose your element</h1>
    <p class="subtitle">Red = Fire · Blue = Water</p>
    <div class="choices">
        <button type="button" id="pickFire" class="choice fire">
            <span class="swatch" aria-hidden="true">
                <img src="fire-portrait.png" alt="" class="swatch-portrait">
            </span>
            <strong>Fire</strong>
            <span class="hint">Red player — safe on orange fire</span>
        </button>
        <button type="button" id="pickWater" class="choice water">
            <span class="swatch" aria-hidden="true">
                <img src="water-portrait.png" alt="" class="swatch-portrait">
            </span>
            <strong>Water</strong>
            <span class="hint">Blue player — safe on cyan water</span>
        </button>
    </div>
    <p id="selectStatus" class="status"></p>
</div>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<div id="gameControls" class="game-controls" hidden>
    <button type="button" id="jumpBtn" class="control-btn" aria-label="Jump">
        <img src="chevron-icon.png" alt="" width="73" height="73">
    </button>
    <div class="move-controls">
        <button type="button" id="backBtn" class="control-btn back-btn" aria-label="Move backward">
            <img src="chevron-icon.png" alt="" width="73" height="73">
        </button>
        <button type="button" id="moveBtn" class="control-btn move-btn" aria-label="Move forward">
            <img src="chevron-icon.png" alt="" width="73" height="73">
        </button>
    </div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
